services:
  postgres:
    image: postgres:16-alpine
    container_name: bigotti_online_store_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bigotti_online_store
    ports:
      - "5432:5432"
    volumes:
      - bigotti_online_store_pgdata:/var/lib/postgresql/data

volumes:
  bigotti_online_store_pgdata:
