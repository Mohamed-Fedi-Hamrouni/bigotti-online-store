name: Validate pull request

on:
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-pull-request-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend-validation:
    name: Backend validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/ci_database

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test -- --runInBand

      - name: Build backend
        working-directory: backend
        run: npm run build

  frontend-validation:
    name: Frontend validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      NEXT_PUBLIC_API_URL: https://example.invalid
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ci-validation.apps.googleusercontent.com

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Build frontend
        working-directory: frontend
        run: npm run build
