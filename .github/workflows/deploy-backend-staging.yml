name: Deploy backend staging

on:
  push:
    branches:
      - staging
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-staging.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend-staging
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    name: Validate and deploy backend staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    env:
      CI: "true"
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/ci_database
      DEPLOY_ZIP: ${{ github.workspace }}/bigotti-backend-staging.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test -- --runInBand

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Authenticate with Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Open PostgreSQL firewall for GitHub runner
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_POSTGRES_SERVER: ${{ vars.AZURE_POSTGRES_SERVER }}
        run: |
          RUNNER_IP="$(curl -4 --fail --silent --show-error https://api.ipify.org)"
          RULE_NAME="github-actions-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          az postgres flexible-server firewall-rule create \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server-name "$AZURE_POSTGRES_SERVER" \
            --name "$RULE_NAME" \
            --start-ip-address "$RUNNER_IP" \
            --end-ip-address "$RUNNER_IP" \
            --output none

          echo "POSTGRES_FIREWALL_RULE=$RULE_NAME" >> "$GITHUB_ENV"

      - name: Apply Prisma migrations
        working-directory: backend
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          sleep 15
          npm run migrate:deploy

      - name: Close PostgreSQL firewall
        if: ${{ always() && env.POSTGRES_FIREWALL_RULE != '' }}
        env:
          AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
          AZURE_POSTGRES_SERVER: ${{ vars.AZURE_POSTGRES_SERVER }}
        run: |
          az postgres flexible-server firewall-rule delete \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --server-name "$AZURE_POSTGRES_SERVER" \
            --name "$POSTGRES_FIREWALL_RULE" \
            --yes \
            --output none

      - name: Keep production dependencies only
        working-directory: backend
        run: npm prune --omit=dev --no-audit --no-fund

      - name: Verify production runtime files
        working-directory: backend
        run: |
          test -f dist/src/main.js
          test -d generated/prisma
          test -d node_modules/@nestjs/core
          test -d node_modules/@prisma/client

      - name: Verify compiled entry point
        run: |
          if [ ! -f backend/dist/src/main.js ]; then
            echo "Compiled entry point backend/dist/src/main.js is missing."
            exit 1
          fi

      - name: Create ready-to-run deployment package
        working-directory: backend
        run: |
          rm -f "$DEPLOY_ZIP"

          zip -rq "$DEPLOY_ZIP" . \
            -x \
              ".git/*" \
              ".env" \
              ".env.*" \
              "coverage/*" \
              "*.log" \
              ".DS_Store"

          test -f "$DEPLOY_ZIP"

          ZIP_CONTENTS="$(unzip -Z1 "$DEPLOY_ZIP")"

          for required_file in \
            package.json \
            package-lock.json \
            dist/src/main.js
          do
            if ! printf '%s\n' "$ZIP_CONTENTS" | grep -Fxq "$required_file"; then
              echo "Required file missing: $required_file"
              exit 1
            fi
          done

          for required_directory in \
            "node_modules/" \
            "generated/prisma/"
          do
            if ! printf '%s\n' "$ZIP_CONTENTS" | grep -q "^${required_directory}"; then
              echo "Required directory missing: $required_directory"
              exit 1
            fi
          done

          if printf '%s\n' "$ZIP_CONTENTS" | grep -Eq '(^|/)\.env($|\.)'; then
            echo "A .env file was found in the deployment package."
            exit 1
          fi

          echo "Ready-to-run deployment package:"
          du -h "$DEPLOY_ZIP"

      - name: Deploy backend to Azure staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.DEPLOY_ZIP }}

      - name: Verify staging health
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          echo "Checking $STAGING_API_URL/health/ready"

          for attempt in $(seq 1 30); do
            HTTP_CODE="$(
              curl \
                --silent \
                --show-error \
                --location \
                --max-time 20 \
                --output /tmp/health-response.json \
                --write-out "%{http_code}" \
                "$STAGING_API_URL/health/ready" \
                || true
            )"

            echo "Attempt $attempt/30: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              cat /tmp/health-response.json
              echo
              echo "Backend staging is ready."
              exit 0
            fi

            sleep 10
          done

          echo "Backend staging did not become ready."
          cat /tmp/health-response.json 2>/dev/null || true
          exit 1

      - name: Azure logout
        if: always()
        run: az logout
