name: Deploy backend staging

on:
  push:
    branches:
      - staging
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend-staging.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-backend-staging
  cancel-in-progress: false

jobs:
  validate-and-deploy:
    name: Validate and deploy backend staging
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: staging

    env:
      CI: "true"
      DATABASE_URL: postgresql://ci_user:ci_password@localhost:5432/ci_database
      DEPLOY_ZIP: ${{ runner.temp }}/bigotti-backend-staging.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Run backend tests
        working-directory: backend
        run: npm test -- --runInBand

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Verify compiled entry point
        run: |
          if [ ! -f backend/dist/src/main.js ]; then
            echo "Compiled entry point backend/dist/src/main.js is missing."
            exit 1
          fi

      - name: Create deployment package
        working-directory: backend
        run: |
          rm -f "$DEPLOY_ZIP"

          zip -rq "$DEPLOY_ZIP" . \
            -x \
              "node_modules/*" \
              "dist/*" \
              "coverage/*" \
              ".git/*" \
              ".env" \
              ".env.*" \
              "*.log" \
              ".DS_Store"

          test -f "$DEPLOY_ZIP"

          ZIP_CONTENTS="$(unzip -Z1 "$DEPLOY_ZIP")"

          for required_file in \
            package.json \
            package-lock.json \
            nest-cli.json \
            tsconfig.json \
            prisma.config.ts \
            prisma/schema.prisma \
            src/main.ts
          do
            if ! printf '%s\n' "$ZIP_CONTENTS" | grep -Fxq "$required_file"; then
              echo "Required file missing from package: $required_file"
              exit 1
            fi
          done

          if printf '%s\n' "$ZIP_CONTENTS" | grep -Eq '(^|/)\.env($|\.)'; then
            echo "A .env file was found in the deployment package."
            exit 1
          fi

          echo "Deployment package created:"
          du -h "$DEPLOY_ZIP"

      - name: Authenticate with Azure using OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy backend to Azure staging
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          package: ${{ env.DEPLOY_ZIP }}

      - name: Verify staging health
        env:
          STAGING_API_URL: ${{ vars.STAGING_API_URL }}
        run: |
          echo "Checking $STAGING_API_URL/health/ready"

          for attempt in $(seq 1 30); do
            HTTP_CODE="$(
              curl \
                --silent \
                --show-error \
                --location \
                --max-time 20 \
                --output /tmp/health-response.json \
                --write-out "%{http_code}" \
                "$STAGING_API_URL/health/ready" \
                || true
            )"

            echo "Attempt $attempt/30: HTTP $HTTP_CODE"

            if [ "$HTTP_CODE" = "200" ]; then
              cat /tmp/health-response.json
              echo
              echo "Backend staging is ready."
              exit 0
            fi

            sleep 10
          done

          echo "Backend staging did not become ready."
          cat /tmp/health-response.json 2>/dev/null || true
          exit 1

      - name: Azure logout
        if: always()
        run: az logout
